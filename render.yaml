services:
  - type: web
    name: divisense-ai
    runtime: python
    plan: free
    branch: render-deploy
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
