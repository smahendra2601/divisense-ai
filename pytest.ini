[pytest]
# Without this, `from src import ...` in tests/conftest.py only resolves when
# invoked as `python -m pytest` (which prepends the CWD to sys.path) — the
# bare `pytest` entry-point script (what CI and Render's own tooling use)
# does not add the repo root, so collection fails with
# "ModuleNotFoundError: No module named 'src'".
pythonpath = .
markers =
    integration: hits live yfinance / network (deselect with -m "not integration")
